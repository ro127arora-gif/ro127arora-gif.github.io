<!DOCTYPE>
<html>
<head>
  <title>Self-test</title>
  <style>
    .main-box {
      background-color:#1a1a1a;
      color:white;
      border:5px solid #e0e0e0;
      border-radius:15px ;
      margin:50px auto;
      width:600px;
      padding:30px;
      display:block;
    }
     body {
      background-color:black;
      color:white;
      text-align:center;
    }
    .box1 {
      background-color:#1b4332;
      color:#81c784;
      border-radius: 10px;
      border: 1px solid #554400;
      margin-bottom:15px;
    }
     .box2 {
      background-color:#332b00;
      color:#ffd700;
      border-radius: 10px;
      border: 10px solid orange;
      margin-bottom:15px; 
    }
     .box3 {
      background-color:#03045e;
      color:#90e0ef;
      border-radius: 10px;
      border: 1px solid #0077b6;
    }
  </style>
</head>  
  <script>
    // Python API se data khincho
    fetch('http://127.0.0.1:5000/api/dashboard')
        .then(response => response.json()) // Data ko JSON mein badlo
        .then(data => {
            // HTML ki IDs ko backend ke data se badlo
            document.getElementById('data1').innerText = data.progress;
            document.getElementById('data2').innerText = data.status;
            document.getElementById('data3').innerText = data.goal;
        });
</script>
<body>
  <div class = "main-box">
    <div class = "box1">
      <h3>Progress:<span id="data">...</h3>
    </div>
    <div class = "box2">
      <h3>Status:<span id="data2">...</h3>
    </div
    <div class = "box3">
      <h3>Goal:<span id="data3">...</h3>
    </div>
  </div>
</body>  
    
</html>
